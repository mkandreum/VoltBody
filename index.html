<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>⚡ VoltBody</title>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="VoltBody">

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>

    <style>
        :root{
        --neon-green:#39FF14;
        --neon-yellow:#E8FF00;
        --neon-pink:#FF00FF;
        --neon-blue:#00F2FF;
        --neon-red:#FF073A;
        --app-bg:#0A0A10;
        --text-primary:rgba(255,255,255,0.98);
        --text-secondary:rgba(255,255,255,0.7);
        --border-color:rgba(0,242,255,0.25);

        /* Variables para el estilo Liquid Glass */
        --c-glass: #bbbbbc;
        --c-light: #fff;
        --c-dark: #000;
        --glass-reflex-dark: 2;
        --glass-reflex-light: 0.3;
        --saturation: 150%;
        }

        /* --- TEMAS --- */
        body.theme-blue{--neon-green:#39FF14;--neon-yellow:#E8FF00;--neon-pink:#FF00FF;--neon-blue:#00F2FF;--neon-red:#FF073A;--border-color:rgba(0,242,255,0.25);}
        body.theme-green{--neon-green:#39FF14;--neon-yellow:#ADFF2F;--neon-pink:#ABFF4F;--neon-blue:#39FF14;--neon-red:#FF3131;--border-color:rgba(57,255,20,0.3);}
        body.theme-pink{--neon-green:#F0F;--neon-yellow:#FF1493;--neon-pink:#FF00FF;--neon-blue:#FF69B4;--neon-red:#FF073A;--border-color:rgba(255,0,255,0.25);}
        body.theme-yellow{--neon-green:#E8FF00;--neon-yellow:#FFD700;--neon-pink:#FFA500;--neon-blue:#F0E68C;--neon-red:#FF4500;--border-color:rgba(232,255,0,0.25);}
        body.theme-red{--neon-green:#FFA500;--neon-yellow:#FF4500;--neon-pink:#FF073A;--neon-blue:#FF6347;--neon-red:#FF073A;--border-color:rgba(255,7,58,0.3);}
        body.theme-purple{--neon-green:#39FF14;--neon-yellow:#F0F;--neon-pink:#9D00FF;--neon-blue:#00BFFF;--neon-red:#FF007F;--border-color:rgba(157,0,255,0.25);}


        /* --- ANIMACIONES --- */
        @keyframes neon-pulse{0%,100%{box-shadow:0 0 4px var(--neon-blue),0 0 8px var(--neon-blue),inset 0 0 4px rgba(0,242,255,0.5)}50%{box-shadow:0 0 8px var(--neon-blue),0 0 16px var(--neon-blue),inset 0 0 6px rgba(0,242,255,0.5)}}
        @keyframes fadeIn{from{opacity:0;transform:translateY(20px) scale(0.98)}to{opacity:1;transform:translateY(0) scale(1)}}
        @keyframes drift{from{transform:translate(0,0) rotate(0) scale(1)}to{transform:translate(calc(50vw - 150px),calc(50vh - 150px)) rotate(180deg) scale(1.1)}}
        @keyframes fade-out-in { 0% { opacity: 1; transform: translateY(0); } 50% { opacity: 0; transform: translateY(-10px); } 100% { opacity: 1; transform: translateY(0); } }
        @keyframes shine-effect { 0% { transform: translate(-50%, -50%) scale(1); opacity: 0.4; } 100% { transform: translate(-50%, -50%) scale(50); opacity: 0; } }
        @keyframes flash { 0% { opacity: 0; transform: scale(0.5); } 20% { opacity: 1; transform: scale(1.1); } 80% { opacity: 0.8; } 100% { opacity: 0; transform: scale(1); } }

        @keyframes slideDownFadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        -webkit-tap-highlight-color: transparent;
        outline: none;
        }

        html {
            scroll-behavior: smooth;
        }

        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',sans-serif;background:var(--app-bg);color:var(--text-primary);overflow-x:hidden; transition: background 0.5s; padding-top: env(safe-area-inset-top);}
        body{-ms-overflow-style: none;scrollbar-width: none;}
        body::-webkit-scrollbar {display: none;}

        /* --- LAYOUT Y FONDOS --- */
        .liquid-container{width:100vw;height:100vh;position:fixed;top:0;left:0;z-index:-2;overflow:hidden;filter:blur(120px) saturate(1.5)}
        body::after{content:'';position:fixed;top:0;left:0;right:0;bottom:0;width:100vw;height:100vh;z-index:-1;pointer-events:none;background:url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="1.5" numOctaves="3" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(%23n)"/></svg>');opacity:0.03}
        .blob{position:absolute;border-radius:50%;opacity:.7;animation:drift 25s infinite alternate;transition: all .5s ease-out}
        .blob1{width:400px;height:400px;background:radial-gradient(circle,var(--neon-blue),transparent 60%);top:-100px;left:-150px;animation-duration:22s}
        .blob2{width:350px;height:350px;background:radial-gradient(circle,var(--neon-pink),transparent 70%);bottom:-50px;right:-100px;animation-duration:30s}
        .blob3{width:300px;height:300px;background:radial-gradient(circle,var(--neon-green),transparent 65%);top:50%;left:50%;transform:translate(-50%,-50%);animation-duration:25s}
        .blob4{width:250px;height:250px;background:radial-gradient(circle,var(--neon-yellow),transparent 75%);bottom:10%;left:5%;animation-duration:35s}
        .container{max-width:500px;margin:0 auto;padding:20px 16px 140px}

        /* --- ESTILO GLASS --- */
        .glass{
        backdrop-filter:blur(12px) saturate(var(--saturation));
        -webkit-backdrop-filter:blur(12px) saturate(var(--saturation));
        background-color: color-mix(in srgb, var(--c-glass) 12%, transparent);
        border-radius:28px;
        border: none;
        box-shadow:
        inset 0 0 0 1px color-mix(in srgb, var(--c-light) calc(var(--glass-reflex-light) * 10%), transparent),
        inset 1.8px 3px 0px -2px color-mix(in srgb, var(--c-light) calc(var(--glass-reflex-light) * 90%), transparent),
        inset -2px -2px 0px -2px color-mix(in srgb, var(--c-light) calc(var(--glass-reflex-light) * 80%), transparent),
        inset -3px -8px 1px -6px color-mix(in srgb, var(--c-light) calc(var(--glass-reflex-light) * 60%), transparent),
        inset -0.3px -1px 4px 0px color-mix(in srgb, var(--c-dark) calc(var(--glass-reflex-dark) * 12%), transparent),
        inset -1.5px 2.5px 0px -2px color-mix(in srgb, var(--c-dark) calc(var(--glass-reflex-dark) * 20%), transparent),
        inset 0px 3px 4px -2px color-mix(in srgb, var(--c-dark) calc(var(--glass-reflex-dark) * 20%), transparent),
        inset 2px -6.5px 1px -4px color-mix(in srgb, var(--c-dark) calc(var(--glass-reflex-dark) * 10%), transparent),
        0px 1px 5px 0px color-mix(in srgb, var(--c-dark) calc(var(--glass-reflex-dark) * 10%), transparent),
        0px 6px 16px 0px color-mix(in srgb, var(--c-dark) calc(var(--glass-reflex-dark) * 8%), transparent);
        transition:all .4s ease;
        }
        .glass:hover{
        transform:translateY(-5px);
        box-shadow:
        inset 0 0 0 1.5px color-mix(in srgb, var(--c-light) calc(var(--glass-reflex-light) * 12%), transparent),
        inset 2px 3.2px 0px -2px color-mix(in srgb, var(--c-light) calc(var(--glass-reflex-light) * 95%), transparent),
        inset -2.2px -2.2px 0px -2px color-mix(in srgb, var(--c-light) calc(var(--glass-reflex-light) * 85%), transparent),
        inset -3.2px -8.2px 1px -6px color-mix(in srgb, var(--c-light) calc(var(--glass-reflex-light) * 65%), transparent),
        inset -0.3px -1px 4px 0px color-mix(in srgb, var(--c-dark) calc(var(--glass-reflex-dark) * 15%), transparent),
        inset -1.5px 2.5px 0px -2px color-mix(in srgb, var(--c-dark) calc(var(--glass-reflex-dark) * 22%), transparent),
        inset 0px 3px 4px -2px color-mix(in srgb, var(--c-dark) calc(var(--glass-reflex-dark) * 22%), transparent),
        inset 2px -6.5px 1px -4px color-mix(in srgb, var(--c-dark) calc(var(--glass-reflex-dark) * 12%), transparent),
        0px 1px 8px 0px color-mix(in srgb, var(--c-dark) calc(var(--glass-reflex-dark) * 15%), transparent),
        0px 8px 20px 0px color-mix(in srgb, var(--c-dark) calc(var(--glass-reflex-dark) * 10%), transparent);
        }

        /* --- COMPONENTES PRINCIPALES --- */
        .header{position: relative; text-align:center;padding:25px 20px;margin-bottom:20px; margin-top: 15px;}
        .header h1{font-size:3rem;font-weight:800;letter-spacing:-1.5px;margin-bottom:10px;color:var(--neon-yellow);text-shadow:0 0 5px var(--neon-yellow),0 0 15px var(--neon-yellow),0 0 25px rgba(232,255,0,0.7); display: flex; align-items: center; justify-content: center; gap: 15px;}
        .header-icon { font-size: 2.2rem; vertical-align: middle; color: var(--text-primary); text-shadow: none;}
        .clickable-icon { cursor: pointer; transition: transform 0.3s, color 0.3s; }
        .clickable-icon:hover { transform: rotate(90deg) scale(1.1); color: var(--neon-blue); }
        #lightning-icon { font-size: 2.8rem; transition: transform 0.3s; }
        #lightning-icon:hover { transform: scale(1.2); }
        .header p{color:var(--text-secondary);font-size:1.1rem}

        /* --- INICIO: SECCIÓN DE BARRA DE NAVEGACIÓN ACTUALIZADA --- */
        .tab-bar-container {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            z-index: 1000;
            pointer-events: none;
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* Estilo de la barra de navegación principal, imitando el 'glass' de ZaveBill. */
        .nav-tabs.glass {
            display: flex;
            justify-content: space-around;
            align-items: center;
            height: 70px; /* Altura estándar de ZaveBill */
            width: calc(100% - 40px);
            max-width: 480px; /* Ajustado para 5 iconos */
            position: relative;
            pointer-events: auto;
            padding: 0 10px; /* Espaciado interno de ZaveBill */
            border-radius: 35px; /* Bordes redondeados de ZaveBill */
            /* Estilo 'glass' directamente aplicado */
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            background: rgba(35, 35, 50, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 15px 30px -10px rgba(0,0,0,0.5), inset 0 1px 2px rgba(255,255,255,0.05);
            transition: all .4s ease;
        }

        /* El nuevo indicador de pestaña activa, estilo CRISTAL, sin neón. */
        .nav-indicator {
            position: absolute;
            left: 0; /* Se posicionará con JS */
            top: -2px; /* Posicionamiento superior como en ZaveBill */
            height: 74px; /* Altura ajustada para el nuevo contenedor */
            border-radius: 37px; /* Radio de ZaveBill */
            transition: transform .6s cubic-bezier(.65,0,.35,1),width .6s cubic-bezier(.65,0,.35,1);
            z-index: 1;
            /* --- ESTE ES EL ESTILO "CRISTAL" CLAVE DE ZAVEBILL --- */
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.15), rgba(255, 255, 255, 0.05));
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3), 0 2px 3px rgba(0,0,0,0.2);
        }

        .nav-tab {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            font-size: .7rem;
            font-weight: 600;
            cursor: pointer;
            transition: all .3s ease;
            gap: 4px;
            z-index: 2;
            padding: 0 5px;
        }

        .nav-tab.active {
            color: var(--text-primary);
            font-weight: 700;
            transform: scale(1.1);
        }

        .nav-tab:hover {
            color: var(--neon-blue);
        }

        .nav-tab .icon {
            font-size: 1.5rem;
            transition: transform .3s ease
        }

        /* El efecto de "elevación" del icono activo. */
        .nav-tab.active .icon {
            transform: translateY(-4px) scale(1.3);
        }
        /* --- FIN: SECCIÓN DE BARRA DE NAVEGACIÓN ACTUALIZADA --- */

        .day-selector-wrapper{overflow-x:auto;padding:20px 0;margin-bottom:24px;}
        .day-selector-wrapper::-webkit-scrollbar{display:none}
        .day-selector{display:flex;gap:12px;padding:0 16px;width:max-content}
        .day-btn {
        padding: 12px 18px;
        border-radius: 18px;
        font-weight: 700;
        cursor: pointer;
        transition: all .3s ease;
        text-align: center;
        font-size: .95rem;
        color: var(--text-secondary);
        border: none;
        background-color: color-mix(in srgb, var(--c-dark) 40%, transparent);
        backdrop-filter: blur(5px);
        -webkit-backdrop-filter: blur(5px);
        box-shadow: inset 0 0 0 1px rgba(255,255,255,0.1), 0 2px 4px rgba(0,0,0,0.2);
        }
        .day-btn:hover {
        background-color: color-mix(in srgb, var(--c-dark) 20%, transparent);
        color: var(--text-primary);
        transform: translateY(-2px);
        }
        .day-btn.active {
        color: #0A0A10;
        transform: translateY(-3px) scale(1.05);
        background-color: color-mix(in srgb, var(--neon-yellow) 85%, transparent);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        box-shadow:
        inset 0 0 0 1.5px rgba(255,255,255,0.2),
        0 6px 20px color-mix(in srgb, var(--neon-yellow) 40%, transparent);
        }

        .content-section{display:none;animation:fadeIn .6s ease forwards}
        .content-section.active{display:block}

        .card{padding:22px;margin-bottom:18px}
        .card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}

        /* --- ESTILOS DE SECCIONES (DIETA, ENTRENO) --- */
        .meal-time{font-size:1.3rem;font-weight:700;color:var(--neon-green);text-shadow:0 0 5px var(--neon-green),0 0 10px color-mix(in srgb, var(--neon-green) 50%, transparent)}
        .meal-calories{background:color-mix(in srgb, var(--neon-green) 15%, transparent);padding:6px 14px;border-radius:12px;font-size:.9rem;font-weight:600;color:var(--neon-green);border:1px solid color-mix(in srgb, var(--neon-green) 50%, transparent)}
        .preparation{border-left:3px solid var(--neon-green)}
        .workout-type{font-size:1.4rem;font-weight:700;color:var(--neon-pink);text-shadow:0 0 5px var(--neon-pink),0 0 10px color-mix(in srgb, var(--neon-pink) 50%, transparent)}
        .workout-time{background:color-mix(in srgb, var(--neon-pink) 15%, transparent);color:var(--neon-pink);padding:6px 14px;border-radius:12px;font-size:.9rem;font-weight:600;border:1px solid color-mix(in srgb, var(--neon-pink) 50%, transparent)}
        .meal-foods{margin-bottom:16px;font-size:1rem;line-height:1.6}
        .macros{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:16px}
        .macro{background:rgba(255,255,255,0.1);padding:6px 12px;border-radius:10px;font-size:.8rem;font-weight:600}
        .preparation{font-size:.9rem;color:var(--text-secondary);line-height:1.5;padding-left:10px;}

        .exercise-item{display:grid;grid-template-columns:1fr auto;align-items:center;gap:15px;padding:14px 4px;border-bottom:1px solid rgba(255,255,255,0.1)}
        .exercise-item:last-child{border-bottom:none}
        .exercise-details{display:flex;flex-direction:column;gap:8px}
        .exercise-name{font-weight:600;font-size:1.05rem;cursor:pointer;transition:color .3s ease}
        .exercise-name:hover{color:var(--neon-blue)}
        .exercise-sets{font-size:.9rem;color:var(--text-secondary);display:flex;align-items:center;gap:8px}
        .weight-rpe-group{display:flex;gap:8px;align-items:center}
        .weight-input,.rpe-select{width:70px;padding:10px;border-radius:12px;border:1px solid rgba(255,255,255,0.3);background:rgba(0,0,0,0.3);color:#fff;text-align:center;font-size:1rem;font-weight:700;-moz-appearance:textfield;transition:all .3s ease}
        .weight-input:focus,.rpe-select:focus{border-color:var(--neon-yellow);box-shadow:0 0 10px rgba(232,255,0,0.5);outline:none}
        .rpe-select{width:60px;font-size:.9rem;padding:10px 5px}
        .onerm-estimate{font-size:.8rem;color:var(--neon-blue);text-align:center;margin-top:5px;height:1em}

        /* --- BOTONES --- */
        .workout-save-btn, .alt-meal-btn, .tool-btn, .modal-close-btn {
        display:block;
        width:100%;
        padding:16px;
        margin:10px auto 0;
        border-radius:20px;
        font-size:1.1rem;
        font-weight:700;
        cursor:pointer;
        text-align:center;
        transition:all .3s ease;
        position: relative;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(5px);
        -webkit-backdrop-filter: blur(5px);
        border: 2px solid;
        box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        text-transform: uppercase;
        letter-spacing: 1px;
        }
        .workout-save-btn { border-color: var(--neon-blue); color: var(--neon-blue); text-shadow: 0 0 8px var(--neon-blue);}
        .alt-meal-btn { border-color: var(--neon-green); color: var(--neon-green); text-shadow: 0 0 8px var(--neon-green); }
        .tool-btn { border-color: var(--neon-blue); color: var(--neon-blue); text-shadow: 0 0 8px var(--neon-blue); width: 100%; padding: 12px 15px; }
        .tool-btn.restore-btn { border-color: var(--neon-green); color: var(--neon-green); text-shadow: 0 0 8px var(--neon-green); }
        .tool-btn.delete-btn { border-color: var(--neon-red); color: var(--neon-red); text-shadow: 0 0 8px var(--neon-red); }
        .modal-close-btn { border-color: var(--neon-red); color: var(--neon-red); text-shadow: 0 0 8px var(--neon-red); margin-top: 20px;}
        .workout-save-btn:hover, .alt-meal-btn:hover, .tool-btn:hover, .modal-close-btn:hover {
        transform:translateY(-4px) scale(1.02);
        background: rgba(255, 255, 255, 0.15);
        box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }
        .btn-shine { position: relative; overflow: hidden; }
        .btn-shine::after { content: ''; position: absolute; top: 50%; left: 50%; width: 5px; height: 5px; background: rgba(255, 255, 255, 0.7); border-radius: 50%; transform: translate(-50%, -50%) scale(1); opacity: 0; }
        .btn-shine:active::after { animation: shine-effect 0.5s ease-out; }

        /* --- HISTORIAL Y GRÁFICAS --- */
        .rec-title{font-size:1.6rem;font-weight:700;margin-bottom:24px;text-align:center;color:var(--neon-yellow);text-shadow:0 0 5px var(--neon-yellow),0 0 10px rgba(232,255,0,0.5)}
        .history-chart-card{margin-bottom:20px;padding:20px}
        .history-exercise-title{font-size:1.4rem;font-weight:700;color:var(--neon-blue);margin-bottom:15px;text-align:center;border-bottom:2px solid var(--neon-blue);padding-bottom:10px;text-shadow:0 0 5px var(--neon-blue),0 0 10px rgba(0,242,255,0.5)}
        .history-stats-container{display:flex;justify-content:space-around;margin-bottom:20px;text-align:center}
        .stat-item h4{font-size:.9rem;color:var(--text-secondary);margin-bottom:8px;font-weight:600;text-transform:uppercase}
        .stat-item p{font-size:1.6rem;font-weight:700}
        .history-chart-wrapper{height:200px;margin-bottom:20px}
        .history-table-container{max-height:180px;overflow-y:auto;padding-right:10px; scrollbar-width: none;}
        .history-table-container::-webkit-scrollbar{display: none;}
        .history-table{width:100%;border-collapse:collapse}
        .history-table th,.history-table td{padding:12px;text-align:left;border-bottom:1px solid rgba(0,242,255,0.15)}
        .history-table th{font-size:.8rem;color:var(--text-secondary);text-transform:uppercase}
        .history-table td{font-size:.95rem}
        .improvement-text .positive{color:var(--neon-green);font-weight:bold}
        .improvement-text .negative{color:var(--neon-red);font-weight:bold}
        #no-history-message{text-align:center;padding:40px;color:var(--text-secondary);font-size:1.1rem}

        /* --- MODALES Y NOTIFICACIONES --- */
        .toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.7);backdrop-filter:blur(15px);-webkit-backdrop-filter:blur(15px);border:1px solid var(--border-color);color:var(--text-primary);padding:14px 28px;border-radius:16px;font-weight:600;opacity:0;transition:all .4s ease;z-index:9999;pointer-events:none;font-size:1.1rem;box-shadow:0 5px 20px rgba(0,0,0,0.4)}
        .toast.show{opacity:1;transform:translateX(-50%) translateY(-10px)}
        .modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);display:flex;justify-content:center;align-items:center;z-index:2000;opacity:0;pointer-events:none;transition:opacity .3s ease}
        .modal.show{opacity:1;pointer-events:auto}
        .modal-content{width:calc(100% - 40px);max-width:480px;padding:25px;text-align:center}
        .modal-content h3{font-size:1.5rem;color:var(--neon-yellow);margin-bottom:15px}
        .modal-content p, .modal-content li {line-height:1.6;color:var(--text-secondary);margin-bottom:10px; text-align: left;}
        .modal-content ul { list-style-position: inside; text-align: left; padding-left: 10px; }
        .modal-content ol { padding-left: 20px; }
        .modal-content img{max-width:100%;border-radius:16px;margin-bottom:20px;border:1px solid var(--border-color)}

        .confirmation-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;

            waist: waist ? parseFloat(waist) : null,
            chest: chest ? parseFloat(chest) : null,
            arm: arm ? parseFloat(arm) : null,
            photo: null

    // --- CALCULATORS ---
    function calculateCalories() {
        const gender = document.getElementById('gender').value;
        const age = parseFloat(document.getElementById('age').value);
        const weight = parseFloat(document.getElementById('weight-cal').value);
        const height = parseFloat(document.getElementById('height').value);
        const activity = parseFloat(document.getElementById('activity').value);
        const resultDiv = document.getElementById('calorie-result');
        if (!age || !weight || !height) {
            resultDiv.textContent = "Por favor, rellena todos los campos.";
            return;
        }
        let bmr;
        if (gender === 'male') {
            bmr = 10 * weight + 6.25 * height - 5 * age + 5;
        } else {
            bmr = 10 * weight + 6.25 * height - 5 * age - 161;
        }
        const maintenance = Math.round(bmr * activity);
        const deficit = maintenance - 400;
        const surplus = maintenance + 400;
        resultDiv.innerHTML = `
        <p>Mantenimiento: ~${maintenance} kcal/día</p>
        <p style="color: var(--neon-red);">Déficit (perder): ~${deficit} kcal/día</p>
        <p style="color: var(--neon-green);">Superávit (ganar): ~${surplus} kcal/día</p>
        `;
    }

    function calculateTool1RM() {
        const weight = parseFloat(document.getElementById('rm-weight').value);
        const reps = parseFloat(document.getElementById('rm-reps').value);
        const resultDiv = document.getElementById('rm-result');
        if (!weight || !reps) {
            resultDiv.textContent = "Por favor, rellena todos los campos.";
            return;
        }
        if (reps === 1) {
            resultDiv.textContent = `Tu 1RM es: ${weight.toFixed(1)} kg`;
            return;
        }
        const oneRepMax = weight * (1 + reps / 30);
        resultDiv.textContent = `Tu 1RM estimado es: ${oneRepMax.toFixed(1)} kg`;
    }

    function backupData() {
        const dataToSave = localStorage.getItem('fitnessLiquidData');

        if (!dataToSave || Object.keys(JSON.parse(dataToSave).historicalData).length === 0) {
            showToast("🤷‍♂️ No hay datos para respaldar.");
            return;
        }

        const date = new Date().toISOString().slice(0, 10);
        const fileName = `voltbody_backup_${date}.json`;

        if (typeof AndroidBridge !== 'undefined' && AndroidBridge.saveFile) {
            AndroidBridge.saveFile(fileName, dataToSave);
        } else {
            const blob = new Blob([dataToSave], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = fileName;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showToast("💾 Respaldo generado (Navegador).");
        }
    }

    function restoreData(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const data = JSON.parse(e.target.result);
                if (data && data.historicalData) {
                    historicalData = data.historicalData;
                    localStorage.setItem('fitnessLiquidData', JSON.stringify({ historicalData }));
                    showToast("🔄 ¡Datos restaurados con éxito!");
                    closeModal();
                    renderCurrentView();
                } else {
                    showToast("❌ Archivo de respaldo no válido.");
                }
            } catch (error) {
                console.error("Error al leer el archivo JSON:", error);
                showToast("❌ Error al restaurar los datos.");
            }
        };
        reader.readAsText(file);
        event.target.value = null;
    }

            <h4>🎨 Cambiar Tema</h4>
            <div class="theme-buttons-grid">
                ${themeButtonsHTML}
            </div>
        </div>
        <div class="settings-modal-section">
            <h4>💾 Gestión de Datos</h4>
            <p style="font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 15px;">Guarda o recupera tu progreso para no perderlo.</p>
            <div class="tool-input-group" style="grid-template-columns: 1fr 1fr; gap: 10px;">
                <button class="tool-btn" onclick="backupData()">Respaldar</button>
                <button class="tool-btn restore-btn" onclick="triggerRestore()">Restaurar</button>
                <button class="tool-btn delete-btn" style="grid-column: 1 / -1;" onclick="deleteAllData()">Eliminar Todo</button>
            </div>
        </div>
        `;
        showModal(settingsContent, true);
    }

    function closeModal(){document.getElementById("modal").classList.remove("show")}

    function setupInputFocusScrolling() {
        const inputs = document.querySelectorAll('input[type="number"], input[type="text"], .rpe-select, .tool-select');
        inputs.forEach(input => {
            input.addEventListener('focus', (event) => {
                setTimeout(() => {
                    event.target.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }, 300);
            });
        });
    }

    document.querySelectorAll(".nav-tab").forEach(a=>{a.addEventListener("click",()=>switchTab(a.dataset.tab))});

    function triggerLightning() {
        const overlay = document.getElementById('lightning-overlay');
        for (let i = 0; i < 3; i++) {
            const lightning = document.createElement('div');
            lightning.className = 'lightning';
            const x = Math.random() * window.innerWidth;
            const y = Math.random() * window.innerHeight * 0.6;
            const rotation = Math.random() * 20 - 10;
            lightning.style.left = `${x}px`;
            lightning.style.top = `${y}px`;
            lightning.style.transform = `rotate(${rotation}deg) scale(${0.8 + Math.random() * 0.4})`;
            overlay.appendChild(lightning);
            setTimeout(() => {
                lightning.remove();
            }, 700);
        }
    }
</script>
</body>
</html>
